# ============================================================
# BASIC KERNEL CONFIGURATION
# ============================================================
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=512

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_MULTITHREADING=y
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_NUM_PREEMPT_PRIORITIES=16

CONFIG_TIMESLICING=y
CONFIG_TIMESLICE_SIZE=0

CONFIG_TICKLESS_KERNEL=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000


# ============================================================
# MEMORY CONFIGURATION (STRICT NO HEAP POLICY)
# ============================================================
CONFIG_HEAP_MEM_POOL_SIZE=0
CONFIG_MAIN_STACK_SIZE=2048

CONFIG_INIT_STACKS=y


# ============================================================
# C++ SUPPORT (C++20 EMBEDDED)
# ============================================================
# NOTE: CONFIG_CPLUSPLUS was removed - undefined symbol per the
# build warnings. Using CONFIG_CPP=y instead. If this still
# warns as undefined, run:
#   grep -rn "^config CPP\b" $ZEPHYR_BASE/subsys/cpp/Kconfig
# and swap in whatever symbol name it reports.
CONFIG_CPP=y
CONFIG_STD_CPP20=y

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y

CONFIG_REQUIRES_FULL_LIBC=y


# ============================================================
# LOGGING & DEBUGGING
# ============================================================
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_PRINTK=y
CONFIG_ASSERT=y
CONFIG_DEBUG=y

CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y


# ============================================================
# GPIO SUPPORT
# ============================================================
CONFIG_GPIO=y


# ============================================================
# CAN / FDCAN SUPPORT (CRITICAL)
# ============================================================
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=y
CONFIG_CAN_INIT_PRIORITY=80



# ============================================================
# STM32 DEVICE SUPPORT
# ============================================================
# NOTE: CONFIG_SOC_SERIES_STM32G4X / CONFIG_SOC_STM32G474XX were
# removed. These are NOT user-configurable Kconfig symbols (they
# have no "prompt" in Kconfig); they are derived automatically
# from the BOARD=nucleo_g474re selection. Setting them explicitly
# in prj.conf causes a hard Kconfig error in this Zephyr version.
CONFIG_CLOCK_CONTROL=y
CONFIG_PINCTRL=y


# ============================================================
# THREADING & SCHEDULING SAFETY
# ============================================================
# NOTE: CONFIG_PREEMPT_ENABLED and CONFIG_SCHED_DUMB removed.
# Both are silent Kconfig symbols (no prompt) in this Zephyr
# version - they're derived automatically, not user-settable.
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_RUNTIME_STATS=y


# ============================================================
# TIME & DELAY
# ============================================================
CONFIG_SYS_CLOCK_EXISTS=y
CONFIG_TIMEOUT_64BIT=y


# ============================================================
# SAFETY FEATURES
# ============================================================
CONFIG_FAULT_DUMP=2


# ============================================================
# OPTIONAL PERFORMANCE / CAN DEBUG
# ============================================================
CONFIG_CAN_RX_TIMESTAMP=y


# ============================================================
# BOOT CONFIG
# ============================================================
CONFIG_BOOT_BANNER=y
CONFIG_BOOT_DELAY=0