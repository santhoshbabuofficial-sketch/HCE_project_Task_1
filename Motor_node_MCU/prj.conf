# ============================================================
# C++ Support
# ============================================================

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# ============================================================
# Main Stack
# ============================================================

CONFIG_MAIN_STACK_SIZE=4096

# ============================================================
# Heap Disabled
# ============================================================

CONFIG_HEAP_MEM_POOL_SIZE=0

# ============================================================
# GPIO Driver
# ============================================================

CONFIG_GPIO=y

# ============================================================
# PWM Driver
# ============================================================

CONFIG_PWM=y

# ============================================================
# CAN Driver
# ============================================================

CONFIG_CAN=y

# STM32 FDCAN
CONFIG_CAN_STM32=y

# CAN-FD Support
CONFIG_CAN_FD_MODE=y

# ============================================================
# Logging
# ============================================================

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ============================================================
# Assertions
# ============================================================

CONFIG_ASSERT=y

# ============================================================
# C++ Exceptions Disabled
# ============================================================

CONFIG_CPP_EXCEPTIONS=n

# ============================================================
# RTTI Disabled
# ============================================================

CONFIG_CPP_RTTI=n

# ============================================================
# Optimization
# ============================================================

CONFIG_SIZE_OPTIMIZATIONS=y