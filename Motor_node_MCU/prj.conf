#
# Motor Node MCU Configuration
# Zephyr RTOS 3.7 LTS
#

# ============================================================
# C LIBRARY SELECTION
# ============================================================
# Zephyr 3.7.0 + Zephyr SDK 0.17.2 has a known regression where
# lib/libc/picolibc/libc-hooks.c conflicts with the picolibc
# headers bundled in this SDK version ("conflicting types for
# '__lock___libc_recursive_mutex'"). This is an upstream
# SDK/source mismatch, not an application defect. Newlib does
# not have this conflict and is fully supported on this target;
# switching to it is the standard workaround until the picolibc
# integration is fixed upstream or a matching SDK/Zephyr pair is
# used instead.
# ============================================================

CONFIG_NEWLIB_LIBC=y

# ============================================================
# BASIC SYSTEM
# ============================================================

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_PRINTK=y

# ============================================================
# GPIO
# ============================================================

CONFIG_GPIO=y

# ============================================================
# CAN (FDCAN)
# ============================================================

CONFIG_CAN=y
CONFIG_CAN_FD_MODE=y

CONFIG_CAN_RX_TIMESTAMP=y

# ============================================================
# THREADING
# ============================================================

CONFIG_MULTITHREADING=y

# ============================================================
# LOGGING BACKEND
# ============================================================

CONFIG_LOG_MODE_IMMEDIATE=y

# ============================================================
# DEBUG SUPPORT (OPTIONAL)
# ============================================================

CONFIG_ASSERT=y
CONFIG_DEBUG=y

# ============================================================
# STACK PROTECTION
# ============================================================

CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

# ============================================================
# KERNEL TICK CONFIG
# ============================================================

CONFIG_TICKLESS_KERNEL=y

# ============================================================
# NO HEAP ALLOCATION (Rule 1)
# ============================================================

CONFIG_HEAP_MEM_POOL_SIZE=0