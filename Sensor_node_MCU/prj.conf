# ============================================================
# C++ SUPPORT
# ============================================================
CONFIG_CPP=y
CONFIG_STD_CPP20=y

# ============================================================
# C LIBRARY
# FIX: Use newlib instead of picolibc.
# picolibc's lock.h declares __lock types that conflict with
# Zephyr's K_MUTEX_DEFINE in libc-hooks.c causing "conflicting
# types" errors. newlib does not have this conflict.
# ============================================================
CONFIG_NEWLIB_LIBC=y

# ============================================================
# MAIN THREAD STACK
# ============================================================
CONFIG_MAIN_STACK_SIZE=4096

# ============================================================
# NO HEAP ALLOCATION (STRICT SAFETY RULE)
# ============================================================
CONFIG_HEAP_MEM_POOL_SIZE=0

# ============================================================
# DRIVERS
# ============================================================
CONFIG_ADC=y
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=y

# ============================================================
# LOGGING
# ============================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# ============================================================
# DEBUG / ASSERT
# ============================================================
CONFIG_ASSERT=y
CONFIG_DEBUG=y

# ============================================================
# THREAD ANALYSIS (REQUIRED BY RULES)
# ============================================================
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30

# ============================================================
# C++ SETTINGS (STRICT — no exceptions, no RTTI)
# ============================================================
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n

# ============================================================
# OPTIMIZATION
# ============================================================
CONFIG_SIZE_OPTIMIZATIONS=y