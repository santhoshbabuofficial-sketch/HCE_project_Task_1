# ---- C++ support ------------------------------------------------------
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_LIB_CXX=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# ---- No heap allocation (Rule 1) --------------------------------------
CONFIG_HEAP_MEM_POOL_SIZE=0

# ---- Threading / stack watermarks (Rule 6) -----------------------------
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_NAME=y
CONFIG_MAIN_STACK_SIZE=2048

# ---- CAN-FD -------------------------------------------------------------
CONFIG_CAN=y
CONFIG_CAN_FD_MODE=y

# ---- I2C (pressure, flow, LCD) ------------------------------------------
CONFIG_I2C=y

# ---- ADC not required: sensors are I2C per hardware spec ---------------

# ---- GPIO -----------------------------------------------------------
CONFIG_GPIO=y

# ---- Logging ----------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# ---- Assertions for defensive programming ------------------------------
CONFIG_ASSERT=y
